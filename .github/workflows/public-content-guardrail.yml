name: Public content guardrail

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  public-content-guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all public Markdown content
        run: python3 scripts/check_public_content.py

      - name: Check resource-aware starter artifacts
        run: python3 scripts/check_resource_aware_starter.py

      - name: Parse starter workflow YAML
        run: |
          ruby -e 'require "yaml"; YAML.parse_file("starter-kits/resource-aware-github/.github/workflows/resource-aware-gate.yml"); puts "Starter workflow YAML parsed."'
